<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>FeSCN²⁺ 勒沙特列原理</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#1a1a1a;--bg2:#242424;--bg3:#2e2e2e;--bg4:#383838;
  --border:rgba(255,255,255,0.13);--border2:rgba(255,255,255,0.08);
  --text:#f0f0ec;--text2:#c0c0bc;--text3:#808080;
  --red:#ff4a30;--blue:#4a9eff;--gold:#ffd440;--green:#3ddc6a;
  --info-bg:rgba(74,158,255,0.15);--info-border:rgba(74,158,255,0.5);--info-text:#7dc4ff;
  --warn-bg:rgba(255,180,30,0.18);--warn-border:rgba(255,180,30,0.55);--warn-text:#ffd440;
  --ok-bg:rgba(61,220,106,0.15);--ok-border:rgba(61,220,106,0.5);--ok-text:#3ddc6a;
  --font:-apple-system,BlinkMacSystemFont,'Segoe UI','Helvetica Neue',sans-serif;
  --r:12px;
}
html{background:var(--bg);color:var(--text);font-family:var(--font);-webkit-text-size-adjust:100%;}
body{min-height:100dvh;padding-bottom:env(safe-area-inset-bottom);}

/* ── Topbar ── */
#topbar{
  position:sticky;top:0;z-index:50;
  background:var(--bg2);border-bottom:1px solid var(--border);
  padding:10px 14px 8px;
}
#topbar h1{font-size:17px;font-weight:800;letter-spacing:-.3px;line-height:1.2;}
#topbar .sub{font-size:11px;color:var(--text3);margin-top:2px;}

/* ── Sections ── */
.section{padding:12px 14px;border-bottom:1px solid var(--border2);}

/* ── Flask ── */
#flask-wrap{width:100%;aspect-ratio:4/3;position:relative;display:flex;align-items:center;justify-content:center;}
#flask-wrap svg{width:100%;height:100%;}

/* ── Status pill ── */
.pill{
  display:inline-flex;align-items:center;gap:5px;
  padding:5px 14px;border-radius:20px;font-size:13px;font-weight:700;
  border:1.5px solid var(--border);color:var(--text2);background:var(--bg3);
  transition:all .35s;
}
.pill.changing{background:var(--warn-bg);color:var(--warn-text);border-color:var(--warn-border);}
.pill.eq{background:var(--ok-bg);color:var(--ok-text);border-color:var(--ok-border);}

/* ── Buttons ── */
.btn-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px;}
.btn-row.three{grid-template-columns:1fr 1fr 1fr;}
.act-btn{
  background:var(--info-bg);border:1.5px solid var(--info-border);color:var(--info-text);
  border-radius:10px;padding:14px 8px;font-size:14px;font-weight:700;
  font-family:var(--font);cursor:pointer;min-height:52px;
  display:flex;align-items:center;justify-content:center;gap:5px;
  transition:opacity .18s,background .18s;-webkit-tap-highlight-color:transparent;
}
.act-btn:active{opacity:.65;}
.act-btn:disabled{opacity:.28;pointer-events:none;}
.reset-btn{
  background:var(--bg3);border:1.5px solid var(--border);color:var(--text2);
  border-radius:10px;padding:12px;font-size:14px;font-weight:600;
  font-family:var(--font);cursor:pointer;width:100%;min-height:48px;
  transition:opacity .18s;-webkit-tap-highlight-color:transparent;
}
.reset-btn:active{opacity:.6;}

/* ── Info box ── */
.info-box{
  background:var(--bg3);border:1.5px solid var(--border);border-radius:var(--r);
  padding:12px 14px;font-size:13.5px;color:var(--text2);line-height:1.75;
}

/* ── Rate bars ── */
.rate-wrap{display:flex;flex-direction:column;gap:8px;}
.rate-row{display:flex;align-items:center;gap:9px;}
.rate-label{font-size:13px;font-weight:800;width:18px;text-align:right;}
.rtrack{height:16px;border-radius:8px;background:var(--bg4);flex:1;overflow:hidden;border:1px solid var(--border2);}
.rfill{height:100%;border-radius:8px;transition:width .12s linear;}
.rate-pct{font-size:13px;font-weight:700;width:34px;}

/* ── Counts ── */
.count-row{display:flex;gap:6px;flex-wrap:wrap;}
.count-chip{
  flex:1;min-width:80px;
  background:var(--bg3);border:1px solid var(--border);border-radius:8px;
  padding:8px 10px;display:flex;align-items:center;gap:7px;
}
.count-dot{width:14px;height:14px;border-radius:50%;flex-shrink:0;}
.count-label{font-size:11px;color:var(--text3);line-height:1.2;}
.count-val{font-size:18px;font-weight:800;color:var(--text);line-height:1;}

/* ── Colour bar ── */
.col-bar-wrap{position:relative;height:18px;border-radius:9px;overflow:hidden;border:1.5px solid var(--border);}
#col-bar-fill{height:100%;width:0%;border-radius:9px;transition:background .3s,width .12s linear;}
#col-marker{position:absolute;top:0;bottom:0;width:3px;background:#fff;opacity:.7;border-radius:2px;transition:left .12s linear;}

/* ── Chart ── */
#chart-wrap{width:100%;aspect-ratio:16/7;position:relative;}
#main-chart{width:100%;height:100%;display:block;border-radius:8px;border:1px solid var(--border);}

/* ── Legend ── */
.legend{display:flex;gap:10px;flex-wrap:wrap;margin-top:4px;}
.leg-item{display:flex;align-items:center;gap:5px;font-size:11.5px;color:var(--text2);}
.leg-line{display:inline-block;width:18px;height:3px;border-radius:2px;}
.leg-dash{display:inline-block;width:18px;height:0;border-top:2px dashed;}

/* ── Hint box ── */
.hint-box{
  background:rgba(74,158,255,0.10);border:1.5px solid var(--info-border);
  border-radius:var(--r);padding:10px 13px;font-size:12px;color:var(--info-text);line-height:1.6;
}

@keyframes fa{0%,100%{transform:translate(0,0)}50%{transform:translate(3px,-4px)}}
@keyframes fb{0%,100%{transform:translate(0,0)}50%{transform:translate(-4px,3px)}}
@keyframes fc{0%,100%{transform:translate(0,0)}50%{transform:translate(2px,4px)}}
@keyframes fd{0%,100%{transform:translate(0,0)}50%{transform:translate(-3px,-2px)}}
@keyframes fe{0%,100%{transform:translate(0,0)}50%{transform:translate(4px,2px)}}
</style>
</head>
<body>

<!-- Topbar -->
<div id="topbar">
  <h1>FeSCN²⁺ ⇌ Fe³⁺ + SCN⁻　勒沙特列原理</h1>
  <div class="sub">血紅色 ⇌ 黃色 ＋ 無色　ΔH &lt; 0（放熱）</div>
</div>

<!-- Flask -->
<div class="section" style="padding-bottom:6px;">
  <div id="flask-wrap">
    <svg viewBox="0 0 400 310" preserveAspectRatio="xMidYMid meet" role="img">
      <defs>
        <marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
          <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
        </marker>
        <clipPath id="fclip">
          <path d="M148,16 L148,100 L52,220 Q38,248 62,260 L318,260 Q342,248 328,220 L232,100 L232,16 Z"/>
        </clipPath>
      </defs>
      <!-- Flask body -->
      <path id="sol-fill"
        d="M148,16 L148,100 L52,220 Q38,248 62,260 L318,260 Q342,248 328,220 L232,100 L232,16 Z"
        fill="rgba(152,26,10,0.45)" stroke="#666" stroke-width="1.8"/>
      <!-- Stopper -->
      <rect x="133" y="3" width="114" height="18" rx="5" fill="#3a3a3a" stroke="#555" stroke-width="1"/>
      <text x="190" y="15" text-anchor="middle" font-size="9" fill="#888" font-family="sans-serif">密閉系統</text>
      <!-- Molecules -->
      <g clip-path="url(#fclip)" id="mol-layer"></g>
      <!-- Equation -->
      <text x="372" y="96" text-anchor="middle" font-size="12" font-weight="800" fill="#f0f0ec" font-family="sans-serif">FeSCN²⁺</text>
      <text x="372" y="110" text-anchor="middle" font-size="9" fill="#888" font-family="sans-serif">（血紅色）</text>
      <line x1="350" y1="122" x2="394" y2="122" stroke="#ff4a30" stroke-width="1.5" marker-end="url(#arr)"/>
      <line x1="394" y1="133" x2="350" y2="133" stroke="#4a9eff" stroke-width="1.5" marker-end="url(#arr)"/>
      <text x="372" y="150" text-anchor="middle" font-size="12" font-weight="800" fill="#f0f0ec" font-family="sans-serif">Fe³⁺</text>
      <text x="372" y="163" text-anchor="middle" font-size="9" fill="#888" font-family="sans-serif">（黃色）＋</text>
      <text x="372" y="178" text-anchor="middle" font-size="12" font-weight="800" fill="#f0f0ec" font-family="sans-serif">SCN⁻</text>
      <text x="372" y="191" text-anchor="middle" font-size="9" fill="#888" font-family="sans-serif">（無色）</text>
      <text x="372" y="206" text-anchor="middle" font-size="8.5" fill="#666" font-family="sans-serif">ΔH &lt; 0（放熱）</text>
    </svg>
  </div>
</div>

<!-- Buttons -->
<div class="section">
  <div class="btn-row three" style="margin-bottom:10px;">
    <button class="act-btn" id="btn-fe"    onclick="perturb('fe')">🧪 加入<br>Fe³⁺</button>
    <button class="act-btn" id="btn-oh"    onclick="perturb('oh')">⚗️ 加入<br>NaOH</button>
    <button class="act-btn" id="btn-water" onclick="perturb('water')">💧 加水<br>稀釋</button>
  </div>
  <div style="display:flex;gap:10px;align-items:center;">
    <button class="reset-btn" style="flex:0 0 auto;width:auto;padding:12px 18px;" onclick="fullReset()">↺ 重置</button>
    <span class="pill eq" id="pill">✓ 動態平衡</span>
  </div>
</div>

<!-- Info box -->
<div class="section">
  <div class="info-box" id="info-box">系統目前處於動態平衡。選擇擾動條件，觀察平衡如何移動。</div>
</div>

<!-- Rates -->
<div class="section">
  <div style="font-size:12px;font-weight:700;color:var(--text3);margin-bottom:8px;letter-spacing:.5px;">反應速率</div>
  <div class="rate-wrap">
    <div class="rate-row">
      <span class="rate-label" style="color:var(--red);">正</span>
      <div class="rtrack"><div class="rfill" id="rfwd" style="width:50%;background:var(--red);"></div></div>
      <span id="lfwd" class="rate-pct" style="color:var(--red);">50%</span>
    </div>
    <div class="rate-row">
      <span class="rate-label" style="color:var(--blue);">逆</span>
      <div class="rtrack"><div class="rfill" id="rrev" style="width:50%;background:var(--blue);"></div></div>
      <span id="lrev" class="rate-pct" style="color:var(--blue);">50%</span>
    </div>
  </div>
</div>

<!-- Counts + colour -->
<div class="section">
  <div style="font-size:12px;font-weight:700;color:var(--text3);margin-bottom:8px;letter-spacing:.5px;">粒子數量</div>
  <div class="count-row">
    <div class="count-chip">
      <div class="count-dot" style="background:rgba(255,210,50,.9);"></div>
      <div><div class="count-label">Fe³⁺</div><div class="count-val" id="cnt-fe">5</div></div>
    </div>
    <div class="count-chip">
      <div class="count-dot" style="background:rgba(185,185,180,.7);"></div>
      <div><div class="count-label">SCN⁻</div><div class="count-val" id="cnt-scn">4</div></div>
    </div>
    <div class="count-chip">
      <div class="count-dot" style="background:rgba(220,60,30,.85);"></div>
      <div><div class="count-label">FeSCN²⁺</div><div class="count-val" id="cnt-fscn">5</div></div>
    </div>
  </div>
  <div style="margin-top:10px;">
    <div style="font-size:12px;font-weight:700;color:var(--text3);margin-bottom:6px;">溶液顏色</div>
    <div class="col-bar-wrap">
      <div style="position:absolute;inset:0;background:linear-gradient(to right,rgba(255,218,48,.25),rgba(152,26,10,.85));"></div>
      <div id="col-marker" style="left:55%;"></div>
    </div>
    <div style="display:flex;justify-content:space-between;font-size:10px;color:var(--text3);margin-top:3px;"><span>淡黃</span><span>血紅 →</span></div>
  </div>
</div>

<!-- Chart -->
<div class="section">
  <div style="font-size:12px;font-weight:700;color:var(--text3);margin-bottom:8px;letter-spacing:.5px;">濃度與速率 — 時間曲線</div>
  <div id="chart-wrap">
    <canvas id="main-chart"></canvas>
  </div>
  <div class="legend" style="margin-top:6px;">
    <span class="leg-item"><span class="leg-line" style="background:rgba(255,210,50,.95);"></span>Fe³⁺</span>
    <span class="leg-item"><span class="leg-line" style="background:rgba(180,180,175,.9);"></span>SCN⁻</span>
    <span class="leg-item"><span class="leg-line" style="background:rgba(220,70,30,.95);"></span>FeSCN²⁺</span>
    <span class="leg-item"><span class="leg-line" style="background:var(--red);"></span>正速率</span>
    <span class="leg-item"><span class="leg-line" style="background:var(--blue);"></span>逆速率</span>
  </div>
</div>

<!-- Hint -->
<div class="section" style="border-bottom:none;padding-bottom:20px;">
  <div class="hint-box">📌 平衡濃度由 <strong>Kc</strong> 決定，三種離子的平衡濃度比不等於係數比。</div>
</div>

<script>
/* ── Molecule slots (viewBox 400×310, flask path scaled) ── */
const FE_SLOTS=[
  {x:158,y:46},{x:190,y:30},{x:222,y:46},{x:172,y:72},{x:208,y:62},
  {x:148,y:86},{x:232,y:82},{x:190,y:84},{x:138,y:62},{x:242,y:68}
];
const SCN_SLOTS=[
  {x:92,y:138},{x:130,y:122},{x:170,y:132},{x:210,y:122},{x:248,y:135},{x:276,y:148},
  {x:78,y:162},{x:118,y:152},{x:160,y:162},{x:204,y:152}
];
const FSCN_SLOTS=[
  {x:72,y:200},{x:116,y:184},{x:162,y:198},{x:206,y:184},{x:250,y:198},{x:288,y:210},
  {x:88,y:228},{x:140,y:218},{x:192,y:228},{x:244,y:218}
];
const ANIMS=['fa','fb','fc','fd','fe'];
const DURS=['3.2s','3.9s','4.5s','2.9s','3.6s','4.2s','2.7s','3.5s','4.8s','3.1s'];
const MAX_FE=10,MAX_SCN=10,MAX_FSCN=10;

/* ── Chemistry ── */
const BASE={fe:2.0,scn:5.5,fscn:8.0,feCnt:2,scnCnt:6,fscnCnt:8,rate:50};
const JUMP={
  fe:   {fe:6.0,scn:5.5,fscn:8.0, fwd:50,rev:90},
  oh:   {fe:0.5,scn:5.5,fscn:8.0, fwd:50,rev:15},
  water:{fe:1.0,scn:2.75,fscn:4.0,fwd:28,rev:18},
};
const NEW_EQ={
  fe:   {fe:4.0,scn:3.5,fscn:10.0,feCnt:4,scnCnt:4,fscnCnt:10,rate:65},
  oh:   {fe:1.0,scn:7.5,fscn:6.0, feCnt:1,scnCnt:8,fscnCnt:6, rate:30},
  water:{fe:1.4,scn:3.55,fscn:3.2,feCnt:1,scnCnt:4,fscnCnt:3, rate:22},
};
const INFO={
  fe:['🧪 <strong>加入 Fe³⁺</strong>：Fe³⁺ 濃度瞬間升高，逆反應速率（生成 FeSCN²⁺ 方向）立即跳升，平衡向左移動，溶液血紅色加深。',
      'FeSCN²⁺ 增加，SCN⁻ 和多餘 Fe³⁺ 被消耗，逆速率下降，正速率上升，趨向新的平衡。',
      '✅ 新平衡建立。FeSCN²⁺ 大幅增加，溶液顏色更深，新平衡速率高於原本。'],
  oh:['⚗️ <strong>加入 NaOH</strong>：OH⁻ 將 Fe³⁺ 沉澱，Fe³⁺ 瞬間減少，逆反應速率立即下降，平衡向右移動（FeSCN²⁺ 分解）。',
      'FeSCN²⁺ 持續分解，釋出 SCN⁻。正速率下降，逆速率上升，趨向新的平衡。溶液顏色變淺。',
      '✅ 新平衡建立。FeSCN²⁺ 大幅減少，SCN⁻ 增加，溶液明顯變淺。'],
  water:['💧 <strong>加水稀釋</strong>：所有離子濃度同比例下降，Qc > Kc，平衡向右移動（FeSCN²⁺ 分解，Fe³⁺ 和 SCN⁻ 增加）。',
         'FeSCN²⁺ 持續減少，Fe³⁺ 和 SCN⁻ 增加，正反應速率大於逆反應速率，趨向新的平衡。',
         '✅ 新平衡建立。所有濃度均低於原始平衡，溶液顏色比原來淡。'],
};

/* ── State ── */
let pType=null,phase='eq',phaseT=0;
let peakFe,peakScn,peakFscn,peakFwd,peakRev,peakFeCnt,peakScnCnt,peakFscnCnt;
let raf=null,lastTs=null,simTime=0,graphData=[],perturbT=null;
let waterAnimT=0;
const T_WATER_ANIM=1.2,T_PRE=2.8,T_REB=5.5,T_POST=2.2;

/* ── Canvas ── */
let ctx,CW,CH;
const PAD={l:28,r:48,t:14,b:24};
const YMAX_C=12,YMAX_R=105;
const feCol='rgba(255,210,50,.95)',scnCol='rgba(175,175,170,.9)',fscnCol='rgba(220,70,30,.95)';
const fwdCol='#ff4a30',revCol='#4a9eff';

function initCanvas(){
  const c=document.getElementById('main-chart');
  const dpr=window.devicePixelRatio||1;
  const rect=document.getElementById('chart-wrap').getBoundingClientRect();
  CW=rect.width; CH=Math.max(rect.height,120);
  c.width=CW*dpr; c.height=CH*dpr;
  c.style.width=CW+'px'; c.style.height=CH+'px';
  ctx=c.getContext('2d'); ctx.scale(dpr,dpr);
}

function lerp(a,b,t){return a+(b-a)*t;}
function easeExp(t,k=3.5){return(1-Math.exp(-k*t))/(1-Math.exp(-k));}
function easeOut(t){return 1-Math.pow(1-t,2);}

/* draw combined conc+rate chart, dual y-axis */
function drawChart(){
  if(!ctx)return;
  const W=CW-PAD.l-PAD.r, H=CH-PAD.t-PAD.b;
  ctx.clearRect(0,0,CW,CH);
  ctx.fillStyle='#1e1e1e'; ctx.beginPath(); ctx.roundRect(0,0,CW,CH,6); ctx.fill();

  /* grid lines (conc left axis) */
  ctx.lineWidth=0.5; ctx.strokeStyle='rgba(255,255,255,0.07)';
  [0,3,6,9,12].forEach(v=>{
    const y=PAD.t+H*(1-v/YMAX_C);
    ctx.beginPath();ctx.moveTo(PAD.l,y);ctx.lineTo(PAD.l+W,y);ctx.stroke();
    ctx.fillStyle='rgba(255,255,255,0.38)';ctx.font='9px sans-serif';ctx.textAlign='right';
    ctx.fillText(v,PAD.l-3,y+3);
  });
  /* right axis labels (rate %) */
  [0,25,50,75,100].forEach(v=>{
    const y=PAD.t+H*(1-v/YMAX_R);
    ctx.fillStyle='rgba(255,255,255,0.22)';ctx.font='8px sans-serif';ctx.textAlign='left';
    ctx.fillText(v+'%',PAD.l+W+3,y+3);
  });

  ctx.fillStyle='rgba(255,255,255,0.2)';ctx.font='8.5px sans-serif';ctx.textAlign='left';
  ctx.fillText('濃度',3,PAD.t+H/2);
  ctx.textAlign='right';
  ctx.fillText('速率',CW-1,PAD.t+H/2);

  const tMax=graphData.length>1?graphData[graphData.length-1].t:T_PRE+T_REB+T_POST;
  const tx=t=>PAD.l+t/(tMax+0.3)*W;
  const tyC=v=>PAD.t+H*(1-Math.min(Math.max(v,0),YMAX_C)/YMAX_C);
  const tyR=v=>PAD.t+H*(1-Math.min(Math.max(v,0),YMAX_R)/YMAX_R);

  /* base dashes */
  [[BASE.fe,feCol],[BASE.scn,scnCol],[BASE.fscn,fscnCol]].forEach(([v,col])=>{
    ctx.setLineDash([4,4]);ctx.lineWidth=0.8;
    ctx.strokeStyle=col.replace(/[\d.]+\)$/,'0.18)');
    ctx.beginPath();ctx.moveTo(PAD.l,tyC(v));ctx.lineTo(PAD.l+W,tyC(v));ctx.stroke();
  });
  ctx.setLineDash([3,4]);ctx.lineWidth=0.6;ctx.strokeStyle='rgba(255,255,255,0.1)';
  ctx.beginPath();ctx.moveTo(PAD.l,tyR(BASE.rate));ctx.lineTo(PAD.l+W,tyR(BASE.rate));ctx.stroke();
  ctx.setLineDash([]);

  /* perturb line */
  if(perturbT!==null){
    ctx.strokeStyle='rgba(255,255,255,0.22)';ctx.lineWidth=1.2;ctx.setLineDash([4,3]);
    ctx.beginPath();ctx.moveTo(tx(perturbT),PAD.t);ctx.lineTo(tx(perturbT),PAD.t+H);ctx.stroke();
    ctx.setLineDash([]);
  }

  if(graphData.length<2){
    /* axes */
    ctx.strokeStyle='rgba(255,255,255,0.2)';ctx.lineWidth=0.8;
    ctx.beginPath();ctx.moveTo(PAD.l,PAD.t);ctx.lineTo(PAD.l,PAD.t+H);ctx.lineTo(PAD.l+W,PAD.t+H);ctx.stroke();
    ctx.fillStyle='rgba(255,255,255,0.2)';ctx.font='9px sans-serif';ctx.textAlign='center';
    ctx.fillText('時間 →',PAD.l+W/2,CH-5);
    /* labels */
    ctx.font='bold 9px sans-serif';ctx.textAlign='left';
    ctx.fillStyle=feCol;ctx.fillText('Fe³⁺',tx(0)+2,tyC(BASE.fe)-3);
    ctx.fillStyle=scnCol;ctx.fillText('SCN⁻',tx(0)+2,tyC(BASE.scn)+10);
    ctx.fillStyle=fscnCol;ctx.fillText('FeSCN²⁺',tx(0)+2,tyC(BASE.fscn)+20);
    return;
  }

  /* conc lines */
  [[d=>d.fe,feCol],[d=>d.scn,scnCol],[d=>d.fscn,fscnCol]].forEach(([fn,col])=>{
    ctx.strokeStyle=col;ctx.lineWidth=2.2;ctx.lineJoin='round';ctx.lineCap='round';
    ctx.beginPath();graphData.forEach((d,i)=>i===0?ctx.moveTo(tx(d.t),tyC(fn(d))):ctx.lineTo(tx(d.t),tyC(fn(d))));ctx.stroke();
  });
  /* rate lines (dashed) */
  [[d=>d.fwd,fwdCol],[d=>d.rev,revCol]].forEach(([fn,col])=>{
    ctx.strokeStyle=col;ctx.lineWidth=1.6;ctx.setLineDash([6,3]);ctx.lineJoin='round';ctx.lineCap='round';
    ctx.beginPath();graphData.forEach((d,i)=>i===0?ctx.moveTo(tx(d.t),tyR(fn(d))):ctx.lineTo(tx(d.t),tyR(fn(d))));ctx.stroke();
    ctx.setLineDash([]);
  });

  /* end labels */
  const last=graphData[graphData.length-1];
  ctx.font='bold 9px sans-serif';ctx.textAlign='left';
  ctx.fillStyle=feCol;ctx.fillText('Fe³⁺',tx(last.t)+3,tyC(last.fe)+3);
  ctx.fillStyle=scnCol;ctx.fillText('SCN⁻',tx(last.t)+3,tyC(last.scn)+3);
  ctx.fillStyle=fscnCol;ctx.fillText('FeSCN²⁺',tx(last.t)+3,tyC(last.fscn)+3);

  /* axes */
  ctx.strokeStyle='rgba(255,255,255,0.2)';ctx.lineWidth=0.8;
  ctx.beginPath();ctx.moveTo(PAD.l,PAD.t);ctx.lineTo(PAD.l,PAD.t+H);ctx.lineTo(PAD.l+W,PAD.t+H);ctx.stroke();
  ctx.fillStyle='rgba(255,255,255,0.2)';ctx.font='9px sans-serif';ctx.textAlign='center';
  ctx.fillText('時間 →',PAD.l+W/2,CH-5);
}

/* ── Molecules ── */
function buildMolLayer(){
  const g=document.getElementById('mol-layer');g.innerHTML='';
  FE_SLOTS.forEach((s,i)=>{
    const el=document.createElementNS('http://www.w3.org/2000/svg','g');
    el.id='fe'+i;
    el.setAttribute('style',`animation:${ANIMS[i%5]} ${DURS[i%10]} ease-in-out infinite;opacity:0;transition:opacity .4s ease;`);
    el.innerHTML=`<g transform="translate(${s.x},${s.y})">
      <circle cx="0" cy="0" r="15" fill="rgba(210,168,18,.75)" stroke="rgba(255,200,0,.5)" stroke-width="1.2"/>
      <text x="0" y="4.5" text-anchor="middle" font-size="9" fill="rgba(255,240,178,.95)" font-family="sans-serif" font-weight="700">Fe³⁺</text>
    </g>`;
    g.appendChild(el);
  });
  SCN_SLOTS.forEach((s,i)=>{
    const el=document.createElementNS('http://www.w3.org/2000/svg','g');
    el.id='scn'+i;
    el.setAttribute('style',`animation:${ANIMS[(i+2)%5]} ${DURS[(i+4)%10]} ease-in-out infinite;opacity:0;transition:opacity .4s ease;`);
    el.innerHTML=`<g transform="translate(${s.x},${s.y})">
      <circle cx="0" cy="0" r="15" fill="rgba(180,180,175,.55)" stroke="rgba(210,210,205,.5)" stroke-width="1.2"/>
      <text x="0" y="4.5" text-anchor="middle" font-size="9" fill="rgba(240,240,240,.92)" font-family="sans-serif" font-weight="700">SCN⁻</text>
    </g>`;
    g.appendChild(el);
  });
  FSCN_SLOTS.forEach((s,i)=>{
    const el=document.createElementNS('http://www.w3.org/2000/svg','g');
    el.id='fscn'+i;
    el.setAttribute('style',`animation:${ANIMS[(i+1)%5]} ${DURS[(i+6)%10]} ease-in-out infinite;opacity:0;transition:opacity .4s ease;`);
    el.innerHTML=`<g transform="translate(${s.x},${s.y})">
      <circle cx="0" cy="0" r="16" fill="rgba(200,40,10,.82)" stroke="rgba(255,80,40,.4)" stroke-width="1.2"/>
      <text x="0" y="4" text-anchor="middle" font-size="7.5" fill="rgba(255,198,188,.95)" font-family="sans-serif" font-weight="700">FeSCN²⁺</text>
    </g>`;
    g.appendChild(el);
  });
}

function setMols(fe,scn,fscn){
  for(let i=0;i<MAX_FE;i++) document.getElementById('fe'+i).style.opacity=Math.max(0,Math.min(1,fe-i));
  for(let i=0;i<MAX_SCN;i++) document.getElementById('scn'+i).style.opacity=Math.max(0,Math.min(1,scn-i));
  for(let i=0;i<MAX_FSCN;i++) document.getElementById('fscn'+i).style.opacity=Math.max(0,Math.min(1,fscn-i));
  document.getElementById('cnt-fe').textContent=Math.round(fe);
  document.getElementById('cnt-scn').textContent=Math.round(scn);
  document.getElementById('cnt-fscn').textContent=Math.round(fscn);
}
function setSolution(fscnC,feC){
  const rf=Math.min(fscnC/9,1),ff=Math.min(feC/6,1);
  const r=Math.round(lerp(lerp(20,210,ff),152,rf));
  const g2=Math.round(lerp(lerp(30,160,ff),26,rf));
  const b=Math.round(lerp(lerp(60,20,ff),10,rf));
  const a=(0.22+0.50*rf);
  document.getElementById('sol-fill').setAttribute('fill',`rgba(${r},${g2},${b},${a.toFixed(2)})`);
  document.getElementById('col-marker').style.left=(Math.min(rf*0.82+ff*0.12,1)*93).toFixed(1)+'%';
}
function setRates(fwd,rev){
  document.getElementById('rfwd').style.width=fwd.toFixed(0)+'%';
  document.getElementById('rrev').style.width=rev.toFixed(0)+'%';
  document.getElementById('lfwd').textContent=fwd.toFixed(0)+'%';
  document.getElementById('lrev').textContent=rev.toFixed(0)+'%';
}
function setBtns(on){['btn-fe','btn-oh','btn-water'].forEach(id=>document.getElementById(id).disabled=!on);}
function setPill(txt,cls){document.getElementById('pill').textContent=txt;document.getElementById('pill').className='pill '+cls;}

/* ── Animation ── */
function animFrame(ts){
  if(!lastTs)lastTs=ts;
  const dt=(ts-lastTs)/1000;lastTs=ts;simTime+=dt;

  if(phase==='water_pre'){
    waterAnimT+=dt;
    const wt=Math.min(waterAnimT/T_WATER_ANIM,1),e=easeOut(wt);
    setSolution(BASE.fscn*(1-e*0.4),BASE.fe);
    graphData.push({t:simTime,fe:BASE.fe,scn:BASE.scn,fscn:BASE.fscn,fwd:BASE.rate,rev:BASE.rate});
    drawChart();
    if(wt>=1){
      phase='rebalance';perturbT=simTime;phaseT=0;
      const j=JUMP['water'];
      peakFe=j.fe;peakScn=j.scn;peakFscn=j.fscn;
      peakFwd=j.fwd;peakRev=j.rev;
      peakFeCnt=Math.round(j.fe/BASE.fe*BASE.feCnt);
      peakScnCnt=Math.round(j.scn/BASE.scn*BASE.scnCnt);
      peakFscnCnt=Math.round(j.fscn/BASE.fscn*BASE.fscnCnt);
      graphData.push({t:simTime+0.001,fe:j.fe,scn:j.scn,fscn:j.fscn,fwd:j.fwd,rev:j.rev});
      setMols(peakFeCnt,peakScnCnt,peakFscnCnt);
      setSolution(j.fscn,j.fe);setRates(j.fwd,j.rev);
      document.getElementById('info-box').innerHTML=INFO['water'][1];
      setPill('反應進行中…','changing');
    }
    raf=requestAnimationFrame(animFrame);return;
  }

  if(phase==='eq_pre'){
    graphData.push({t:simTime,fe:BASE.fe,scn:BASE.scn,fscn:BASE.fscn,fwd:BASE.rate,rev:BASE.rate});
    drawChart();
    if(simTime>=T_PRE){
      perturbT=simTime;phaseT=0;
      const j=JUMP[pType];
      peakFe=j.fe;peakScn=j.scn;peakFscn=j.fscn;
      peakFwd=j.fwd;peakRev=j.rev;
      peakFeCnt=Math.round(j.fe/BASE.fe*BASE.feCnt);
      peakScnCnt=Math.round(j.scn/BASE.scn*BASE.scnCnt);
      peakFscnCnt=Math.round(j.fscn/BASE.fscn*BASE.fscnCnt);
      graphData.push({t:simTime+0.001,fe:j.fe,scn:j.scn,fscn:j.fscn,fwd:j.fwd,rev:j.rev});
      setMols(peakFeCnt,peakScnCnt,peakFscnCnt);
      setSolution(j.fscn,j.fe);setRates(j.fwd,j.rev);
      phase='rebalance';
      document.getElementById('info-box').innerHTML=INFO[pType][1];
      setPill('反應進行中…','changing');
    }
    raf=requestAnimationFrame(animFrame);return;
  }

  if(phase==='rebalance'){
    phaseT=Math.min(phaseT+dt/T_REB,1);
    const e=easeExp(phaseT),tgt=NEW_EQ[pType];
    const fe=lerp(peakFe,tgt.fe,e),scn=lerp(peakScn,tgt.scn,e),fscn=lerp(peakFscn,tgt.fscn,e);
    const fwd=lerp(peakFwd,tgt.rate,e),rev=lerp(peakRev,tgt.rate,e);
    setMols(lerp(peakFeCnt,tgt.feCnt,e),lerp(peakScnCnt,tgt.scnCnt,e),lerp(peakFscnCnt,tgt.fscnCnt,e));
    setSolution(fscn,fe);setRates(fwd,rev);
    graphData.push({t:simTime,fe,scn,fscn,fwd,rev});
    drawChart();
    if(phaseT>=1){
      phase='eq_post';setPill('✓ 動態平衡','eq');
      document.getElementById('info-box').innerHTML=INFO[pType][2];
      setBtns(true);
    }
    raf=requestAnimationFrame(animFrame);return;
  }

  if(phase==='eq_post'){
    const tgt=NEW_EQ[pType];
    graphData.push({t:simTime,fe:tgt.fe,scn:tgt.scn,fscn:tgt.fscn,fwd:tgt.rate,rev:tgt.rate});
    drawChart();
    if(simTime-perturbT-T_REB>T_POST){raf=null;return;}
    raf=requestAnimationFrame(animFrame);return;
  }
  raf=null;
}

function perturb(type){
  if(phase!=='eq'&&phase!=='eq_post')return;
  if(raf){cancelAnimationFrame(raf);raf=null;}
  pType=type;phaseT=0;simTime=0;graphData=[];perturbT=null;lastTs=null;
  peakFe=BASE.fe;peakScn=BASE.scn;peakFscn=BASE.fscn;
  peakFwd=BASE.rate;peakRev=BASE.rate;
  setBtns(false);
  document.getElementById('info-box').innerHTML=INFO[type][0];
  setPill('反應進行中…','changing');
  setMols(BASE.feCnt,BASE.scnCnt,BASE.fscnCnt);
  setSolution(BASE.fscn,BASE.fe);setRates(BASE.rate,BASE.rate);
  if(type==='water'){waterAnimT=0;phase='water_pre';}
  else phase='eq_pre';
  raf=requestAnimationFrame(animFrame);
}

function fullReset(){
  if(raf){cancelAnimationFrame(raf);raf=null;}
  phase='eq';pType=null;simTime=0;graphData=[];perturbT=null;phaseT=0;waterAnimT=0;
  setMols(BASE.feCnt,BASE.scnCnt,BASE.fscnCnt);
  setSolution(BASE.fscn,BASE.fe);setRates(BASE.rate,BASE.rate);
  setPill('✓ 動態平衡','eq');
  document.getElementById('info-box').textContent='系統目前處於動態平衡。選擇擾動條件，觀察平衡如何移動。';
  setBtns(true);drawChart();
}

/* ── Init ── */
buildMolLayer();
setMols(BASE.feCnt,BASE.scnCnt,BASE.fscnCnt);
setSolution(BASE.fscn,BASE.fe);
setRates(BASE.rate,BASE.rate);
window.addEventListener('resize',()=>{initCanvas();drawChart();});
setTimeout(()=>{initCanvas();drawChart();},150);
</script>
