<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>FeSCN²⁺ 勒沙特列原理</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#12100e;--bg2:#1a1712;--bg3:#1e1b16;--bg4:#252118;
  --border:rgba(255,210,120,0.10);--border2:rgba(255,210,120,0.22);
  --text:#f2ead8;--text2:#a09080;--text3:#6a6058;
  --amber:#f5c542;--amber2:#e8a020;--amber3:#ffd880;
  --red:#ff4a30;--blue:#4a9eff;--green:#3ddc6a;
  --ok-bg:rgba(61,220,106,0.14);--ok-border:rgba(61,220,106,0.45);--ok-text:#3ddc6a;
  --warn-bg:rgba(255,180,30,0.16);--warn-border:rgba(255,180,30,0.5);--warn-text:#ffd440;
  --font:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
  --topH:52px;--botH:220px;
}
html,body{height:100%;overflow:hidden;background:var(--bg);color:var(--text);font-family:var(--font);-webkit-text-size-adjust:100%;}

/* ── TOP BAR ── */
#topbar{
  position:fixed;top:0;left:0;right:0;height:var(--topH);z-index:50;
  background:var(--bg2);border-bottom:1px solid var(--border);
  display:flex;align-items:center;justify-content:space-between;padding:0 14px;gap:10px;
}
#topbar .eq{font-size:13px;font-weight:800;letter-spacing:-.2px;color:var(--text);}
#topbar .sub{font-size:10px;color:var(--text3);margin-top:1px;}
.pill{
  display:inline-flex;align-items:center;padding:4px 11px;border-radius:20px;
  font-size:11.5px;font-weight:700;white-space:nowrap;
  border:1.5px solid var(--border);color:var(--text2);background:var(--bg3);
  transition:all .35s;flex-shrink:0;
}
.pill.eq{background:var(--ok-bg);color:var(--ok-text);border-color:var(--ok-border);}
.pill.changing{background:var(--warn-bg);color:var(--warn-text);border-color:var(--warn-border);}

/* ── SLIDE AREA ── */
#slide-viewport{
  position:fixed;
  top:var(--topH);left:0;right:0;
  bottom:var(--botH);
  overflow:hidden;
}
#slide-track{
  display:flex;height:100%;
  transition:transform .38s cubic-bezier(.4,0,.2,1);
  will-change:transform;
}
.slide{flex:0 0 100vw;width:100vw;height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:10px 14px 4px;}

/* Page dots */
#dots{
  position:fixed;z-index:40;
  left:0;right:0;
  bottom:calc(var(--botH) + 6px);
  display:flex;justify-content:center;gap:7px;
}
.dot{width:7px;height:7px;border-radius:50%;background:var(--border2);transition:background .25s,transform .25s;}
.dot.active{background:var(--amber);transform:scale(1.25);}

/* ── FLASK (slide 1) ── */
#flask-svg{width:100%;flex:1;min-height:0;}

/* ── MINI FLASK (slides 2,3) ── */
.mini-flask-wrap{width:64px;height:64px;flex-shrink:0;margin-bottom:6px;}
.mini-flask-wrap svg{width:64px;height:64px;}

/* ── CHART ── */
.chart-wrap{width:100%;flex:1;min-height:0;position:relative;}
.chart-canvas{width:100%;height:100%;display:block;border-radius:10px;border:1px solid var(--border);}
.chart-title{font-size:11.5px;font-weight:700;color:var(--text2);margin-bottom:6px;letter-spacing:.3px;}
.legend{display:flex;gap:8px;flex-wrap:wrap;margin-top:5px;}
.leg-item{display:flex;align-items:center;gap:4px;font-size:10.5px;color:var(--text2);}
.leg-line{display:inline-block;width:16px;height:2.5px;border-radius:2px;}

/* ── BOTTOM FIXED ── */
#bottom{
  position:fixed;bottom:0;left:0;right:0;height:var(--botH);z-index:50;
  background:var(--bg2);border-top:1px solid var(--border);
  display:flex;flex-direction:column;gap:0;
  padding-bottom:env(safe-area-inset-bottom);
}

/* Rate bars */
#rates{padding:8px 14px 6px;}
.sec-label{font-size:10px;font-weight:700;color:var(--text3);letter-spacing:.8px;text-transform:uppercase;margin-bottom:5px;}
.rate-row{display:flex;align-items:center;gap:8px;margin-bottom:4px;}
.rate-lbl{font-size:12px;font-weight:800;width:16px;text-align:right;}
.rtrack{height:13px;border-radius:7px;background:var(--bg4);flex:1;overflow:hidden;border:1px solid rgba(255,255,255,.05);}
.rfill{height:100%;border-radius:7px;transition:width .12s linear;}
.rate-pct{font-size:11.5px;font-weight:700;width:30px;}

/* Particle counts */
#counts{padding:0 14px 6px;display:flex;gap:7px;}
.chip{
  flex:1;background:var(--bg3);border:1px solid var(--border);border-radius:9px;
  padding:6px 8px;display:flex;align-items:center;gap:6px;
}
.chip-dot{width:11px;height:11px;border-radius:50%;flex-shrink:0;}
.chip-lbl{font-size:10px;color:var(--text3);line-height:1.1;}
.chip-val{font-size:16px;font-weight:800;line-height:1;}

/* Info text */
#info-box{
  padding:0 14px 6px;font-size:12px;color:var(--text2);line-height:1.6;
  display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;
}

/* Action buttons */
#btns{padding:0 14px 6px;display:grid;grid-template-columns:1fr 1fr 1fr auto;gap:7px;}
.act-btn{
  background:var(--warn-bg);border:1.5px solid var(--warn-border);color:var(--warn-text);
  border-radius:9px;padding:9px 4px;font-size:12.5px;font-weight:700;
  font-family:var(--font);cursor:pointer;min-height:42px;
  display:flex;align-items:center;justify-content:center;gap:3px;
  -webkit-tap-highlight-color:transparent;transition:opacity .15s;line-height:1.2;text-align:center;
}
.act-btn:active{opacity:.6;}
.act-btn:disabled{opacity:.25;pointer-events:none;}
.reset-btn{
  background:var(--bg3);border:1.5px solid var(--border);color:var(--text2);
  border-radius:9px;padding:9px 10px;font-size:13px;font-weight:600;
  font-family:var(--font);cursor:pointer;min-height:42px;
  -webkit-tap-highlight-color:transparent;transition:opacity .15s;
}
.reset-btn:active{opacity:.6;}

/* Swipe hint */
#swipe-hint{
  position:fixed;top:calc(var(--topH) + 8px);right:10px;z-index:45;
  font-size:10px;color:var(--text3);display:flex;align-items:center;gap:3px;
  opacity:1;transition:opacity 1s;pointer-events:none;
}

@keyframes fa{0%,100%{transform:translate(0,0)}50%{transform:translate(3px,-4px)}}
@keyframes fb{0%,100%{transform:translate(0,0)}50%{transform:translate(-4px,3px)}}
@keyframes fc{0%,100%{transform:translate(0,0)}50%{transform:translate(2px,4px)}}
@keyframes fd{0%,100%{transform:translate(0,0)}50%{transform:translate(-3px,-2px)}}
@keyframes fe{0%,100%{transform:translate(0,0)}50%{transform:translate(4px,2px)}}
</style>
</head>
<body>

<!-- TOP BAR -->
<div id="topbar">

</div><!-- slide-viewport -->

<!-- PAGE DOTS -->

</div>

  <!-- Rate bars -->

<script>
/* ── SWIPE ── */
let curSlide=0;
const track=document.getElementById('slide-track');
const dots=document.querySelectorAll('.dot');
const hint=document.getElementById('swipe-hint');
let tx0=null,isDragging=false,startX=0;
let hintHidden=false;

function goSlide(n){
  curSlide=Math.max(0,Math.min(2,n));
  track.style.transform=`translateX(-${curSlide*100}vw)`;
  dots.forEach((d,i)=>d.classList.toggle('active',i===curSlide));
  if(curSlide>0&&!hintHidden){hint.style.opacity='0';hintHidden=true;}
  if(curSlide===1){setTimeout(()=>{initConcCanvas();drawConc();},60);}
  if(curSlide===2){setTimeout(()=>{initRateCanvas();drawRate();},60);}
}

const vp=document.getElementById('slide-viewport');
vp.addEventListener('touchstart',e=>{tx0=e.touches[0].clientX;isDragging=true;},{ passive:true });
vp.addEventListener('touchmove',e=>{
  if(!isDragging)return;
  const dx=e.touches[0].clientX-tx0;
  track.style.transition='none';
  track.style.transform=`translateX(calc(-${curSlide*100}vw + ${dx}px))`;
},{ passive:true });
vp.addEventListener('touchend',e=>{
  if(!isDragging)return;
  isDragging=false;
  const dx=e.changedTouches[0].clientX-tx0;
  track.style.transition='transform .38s cubic-bezier(.4,0,.2,1)';
  if(dx<-40)goSlide(curSlide+1);
  else if(dx>40)goSlide(curSlide-1);
  else goSlide(curSlide);
});

/* ── Chemistry ── */
const FE_SLOTS=[
  {x:148,y:42},{x:178,y:26},{x:208,y:44},{x:160,y:68},{x:194,y:56},
  {x:136,y:80},{x:220,y:76},{x:178,y:78},{x:126,y:56},{x:230,y:62}
];
const SCN_SLOTS=[
  {x:82,y:134},{x:118,y:118},{x:156,y:130},{x:194,y:118},{x:228,y:132},{x:262,y:148},
  {x:68,y:158},{x:108,y:148},{x:150,y:158},{x:196,y:148}
];
const FSCN_SLOTS=[
  {x:62,y:196},{x:104,y:180},{x:150,y:194},{x:194,y:180},{x:236,y:194},{x:272,y:208},
  {x:80,y:224},{x:132,y:214},{x:184,y:224},{x:236,y:214}
];
const ANIMS=['fa','fb','fc','fd','fe'];
const DURS=['3.2s','3.9s','4.5s','2.9s','3.6s','4.2s','2.7s','3.5s','4.8s','3.1s'];
const MAX_FE=10,MAX_SCN=10,MAX_FSCN=10;
const BASE={fe:2.0,scn:5.5,fscn:8.0,feCnt:2,scnCnt:6,fscnCnt:8,rate:50};
const JUMP={
  fe:   {fe:6.0,scn:5.5,fscn:8.0, fwd:50,rev:90},
  oh:   {fe:0.5,scn:5.5,fscn:8.0, fwd:50,rev:15},
  water:{fe:1.0,scn:2.75,fscn:4.0,fwd:28,rev:18},
};
const NEW_EQ={
  fe:   {fe:4.0,scn:3.5,fscn:10.0,feCnt:4,scnCnt:4,fscnCnt:10,rate:65},
  oh:   {fe:1.0,scn:7.5,fscn:6.0, feCnt:1,scnCnt:8,fscnCnt:6, rate:30},
  water:{fe:1.4,scn:3.55,fscn:3.2,feCnt:1,scnCnt:4,fscnCnt:3, rate:22},
};
const INFO={
  fe:['🧪 <strong>加入 Fe³⁺</strong>：逆反應速率立即跳升，平衡向左移，溶液加深。',
      'FeSCN²⁺ 增加，SCN⁻ 被消耗，速率趨向新平衡。',
      '✅ 新平衡建立，FeSCN²⁺ 增加，顏色更深。'],
  oh: ['⚗️ <strong>加入 NaOH</strong>：Fe³⁺ 被沉澱，逆反應速率下降，平衡向右移。',
      'FeSCN²⁺ 分解，釋出 SCN⁻，溶液顏色變淺。',
      '✅ 新平衡建立，FeSCN²⁺ 減少，顏色變淺。'],
  water:['💧 <strong>加水稀釋</strong>：各離子濃度降低，Qc > Kc，平衡向右移動。',
         'FeSCN²⁺ 分解，Fe³⁺ 和 SCN⁻ 增加，趨向新平衡。',
         '✅ 新平衡建立，整體濃度低於原平衡，溶液更淡。'],
};

let pType=null,phase='eq',phaseT=0;
let peakFe,peakScn,peakFscn,peakFwd,peakRev,peakFeCnt,peakScnCnt,peakFscnCnt;
let raf=null,lastTs=null,simTime=0,graphData=[],perturbT=null,waterAnimT=0;
const T_WATER=1.2,T_PRE=2.8,T_REB=5.5,T_POST=2.2;

/* ── Canvas ── */
let cCtx,CW,CH,rCtx,RW,RH;
const PAD={l:28,r:46,t:10,b:20};
const YMAX_C=12,YMAX_R=105;
const feCol='rgba(255,210,50,.95)',scnCol='rgba(175,175,170,.9)',fscnCol='rgba(220,70,30,.95)';
const fwdCol='#ff4a30',revCol='#4a9eff';

function initConcCanvas(){
  const c=document.getElementById('conc-chart');
  const dpr=window.devicePixelRatio||1;
  const r=c.getBoundingClientRect();
  CW=r.width;CH=Math.max(r.height,80);
  c.width=CW*dpr;c.height=CH*dpr;
  c.style.width=CW+'px';c.style.height=CH+'px';
  cCtx=c.getContext('2d');cCtx.scale(dpr,dpr);
}
function initRateCanvas(){
  const c=document.getElementById('rate-chart');
  const dpr=window.devicePixelRatio||1;
  const r=c.getBoundingClientRect();
  RW=r.width;RH=Math.max(r.height,80);
  c.width=RW*dpr;c.height=RH*dpr;
  c.style.width=RW+'px';c.style.height=RH+'px';
  rCtx=c.getContext('2d');rCtx.scale(dpr,dpr);
}

function lerp(a,b,t){return a+(b-a)*t;}
function easeExp(t,k=3.5){return(1-Math.exp(-k*t))/(1-Math.exp(-k));}
function easeOut(t){return 1-Math.pow(1-t,2);}

function chartBase(ctx,w,h){
  ctx.clearRect(0,0,w,h);
  ctx.fillStyle='#1a1712';ctx.beginPath();ctx.roundRect(0,0,w,h,8);ctx.fill();
}
function chartGrid(ctx,w,h,vals,ymax){
  const W=w-PAD.l-PAD.r,H=h-PAD.t-PAD.b;
  ctx.strokeStyle='rgba(255,255,255,0.06)';ctx.lineWidth=0.5;
  vals.forEach(v=>{
    const y=PAD.t+H*(1-v/ymax);
    ctx.beginPath();ctx.moveTo(PAD.l,y);ctx.lineTo(PAD.l+W,y);ctx.stroke();
    ctx.fillStyle='rgba(255,255,255,0.3)';ctx.font='8px sans-serif';ctx.textAlign='right';
    ctx.fillText(v,PAD.l-3,y+3);
  });
}
function chartAxes(ctx,w,h){
  const W=w-PAD.l-PAD.r,H=h-PAD.t-PAD.b;
  ctx.strokeStyle='rgba(255,255,255,0.15)';ctx.lineWidth=0.8;
  ctx.beginPath();ctx.moveTo(PAD.l,PAD.t);ctx.lineTo(PAD.l,PAD.t+H);ctx.lineTo(PAD.l+W,PAD.t+H);ctx.stroke();
  ctx.fillStyle='rgba(255,255,255,0.2)';ctx.font='8px sans-serif';ctx.textAlign='center';
  ctx.fillText('時間 →',PAD.l+W/2,h-4);
}
function perturbLine(ctx,w,h,txFn){
  if(perturbT===null)return;
  const H=h-PAD.t-PAD.b;
  ctx.strokeStyle='rgba(255,210,80,0.3)';ctx.lineWidth=1.2;ctx.setLineDash([4,3]);
  ctx.beginPath();ctx.moveTo(txFn(perturbT),PAD.t);ctx.lineTo(txFn(perturbT),PAD.t+H);ctx.stroke();
  ctx.setLineDash([]);
}

function drawConc(){
  if(!cCtx)return;
  const W=CW-PAD.l-PAD.r,H=CH-PAD.t-PAD.b;
  chartBase(cCtx,CW,CH);
  chartGrid(cCtx,CW,CH,[0,3,6,9,12],YMAX_C);
  const tMax=graphData.length>1?graphData[graphData.length-1].t:T_PRE+T_REB+T_POST;
  const tx=t=>PAD.l+t/(tMax+0.3)*W;
  const ty=v=>PAD.t+H*(1-Math.min(Math.max(v,0),YMAX_C)/YMAX_C);
  [[BASE.fe,feCol],[BASE.scn,scnCol],[BASE.fscn,fscnCol]].forEach(([v,col])=>{
    cCtx.setLineDash([4,4]);cCtx.lineWidth=0.7;
    cCtx.strokeStyle=col.replace(/[\d.]+\)$/,'0.15)');
    cCtx.beginPath();cCtx.moveTo(PAD.l,ty(v));cCtx.lineTo(PAD.l+W,ty(v));cCtx.stroke();
  });
  cCtx.setLineDash([]);
  perturbLine(cCtx,CW,CH,tx);
  if(graphData.length>=2){
    [[d=>d.fe,feCol,'Fe³⁺'],[d=>d.scn,scnCol,'SCN⁻'],[d=>d.fscn,fscnCol,'FeSCN²⁺']].forEach(([fn,col,lbl])=>{
      cCtx.strokeStyle=col;cCtx.lineWidth=2;cCtx.lineJoin='round';cCtx.lineCap='round';
      cCtx.beginPath();graphData.forEach((d,i)=>i===0?cCtx.moveTo(tx(d.t),ty(fn(d))):cCtx.lineTo(tx(d.t),ty(fn(d))));cCtx.stroke();
    });
    const last=graphData[graphData.length-1];
    cCtx.font='bold 8.5px sans-serif';cCtx.textAlign='left';
    [[last.fe,feCol,'Fe³⁺'],[last.scn,scnCol,'SCN⁻'],[last.fscn,fscnCol,'FeSCN²⁺']].forEach(([v,col,lbl])=>{
      cCtx.fillStyle=col;cCtx.fillText(lbl,tx(last.t)+3,ty(v)+3);
    });
  }
  chartAxes(cCtx,CW,CH);
}

function drawRate(){
  if(!rCtx)return;
  const W=RW-PAD.l-PAD.r,H=RH-PAD.t-PAD.b;
  chartBase(rCtx,RW,RH);
  chartGrid(rCtx,RW,RH,[0,25,50,75,100],YMAX_R);
  const tMax=graphData.length>1?graphData[graphData.length-1].t:T_PRE+T_REB+T_POST;
  const tx=t=>PAD.l+t/(tMax+0.3)*W;
  const ty=v=>PAD.t+H*(1-Math.min(Math.max(v,0),YMAX_R)/YMAX_R);
  rCtx.setLineDash([3,4]);rCtx.lineWidth=0.6;rCtx.strokeStyle='rgba(255,255,255,0.08)';
  rCtx.beginPath();rCtx.moveTo(PAD.l,ty(BASE.rate));rCtx.lineTo(PAD.l+W,ty(BASE.rate));rCtx.stroke();
  rCtx.setLineDash([]);
  perturbLine(rCtx,RW,RH,tx);
  if(graphData.length>=2){
    [[d=>d.fwd,fwdCol,'正'],[d=>d.rev,revCol,'逆']].forEach(([fn,col,lbl])=>{
      rCtx.strokeStyle=col;rCtx.lineWidth=2;rCtx.lineJoin='round';rCtx.lineCap='round';
      rCtx.beginPath();graphData.forEach((d,i)=>i===0?rCtx.moveTo(tx(d.t),ty(fn(d))):rCtx.lineTo(tx(d.t),ty(fn(d))));rCtx.stroke();
    });
    const last=graphData[graphData.length-1];
    rCtx.font='bold 8.5px sans-serif';rCtx.textAlign='left';
    rCtx.fillStyle=fwdCol;rCtx.fillText('正',tx(last.t)+3,ty(last.fwd)+3);
    rCtx.fillStyle=revCol;rCtx.fillText('逆',tx(last.t)+3,ty(last.rev)+3);
  }
  chartAxes(rCtx,RW,RH);
}

/* ── Molecules ── */
function buildMolLayer(){
  const g=document.getElementById('mol-layer');g.innerHTML='';
  FE_SLOTS.forEach((s,i)=>{
    const el=document.createElementNS('http://www.w3.org/2000/svg','g');
    el.id='fe'+i;
    el.setAttribute('style',`animation:${ANIMS[i%5]} ${DURS[i%10]} ease-in-out infinite;opacity:0;transition:opacity .4s;`);
    el.innerHTML=`<g transform="translate(${s.x},${s.y})">
      <circle r="13" fill="rgba(210,168,18,.78)" stroke="rgba(255,200,0,.4)" stroke-width="1"/>
      <text y="4.5" text-anchor="middle" font-size="8" fill="rgba(255,240,178,.95)" font-family="sans-serif" font-weight="700">Fe³⁺</text>
    </g>`;
    g.appendChild(el);
  });
  SCN_SLOTS.forEach((s,i)=>{
    const el=document.createElementNS('http://www.w3.org/2000/svg','g');
    el.id='scn'+i;
    el.setAttribute('style',`animation:${ANIMS[(i+2)%5]} ${DURS[(i+4)%10]} ease-in-out infinite;opacity:0;transition:opacity .4s;`);
    el.innerHTML=`<g transform="translate(${s.x},${s.y})">
      <circle r="13" fill="rgba(175,175,170,.55)" stroke="rgba(210,210,205,.4)" stroke-width="1"/>
      <text y="4.5" text-anchor="middle" font-size="8" fill="rgba(240,240,238,.9)" font-family="sans-serif" font-weight="700">SCN⁻</text>
    </g>`;
    g.appendChild(el);
  });
  FSCN_SLOTS.forEach((s,i)=>{
    const el=document.createElementNS('http://www.w3.org/2000/svg','g');
    el.id='fscn'+i;
    el.setAttribute('style',`animation:${ANIMS[(i+1)%5]} ${DURS[(i+6)%10]} ease-in-out infinite;opacity:0;transition:opacity .4s;`);
    el.innerHTML=`<g transform="translate(${s.x},${s.y})">
      <circle r="14" fill="rgba(200,40,10,.82)" stroke="rgba(255,80,40,.35)" stroke-width="1"/>
      <text y="3.5" text-anchor="middle" font-size="6.5" fill="rgba(255,198,188,.95)" font-family="sans-serif" font-weight="700">FeSCN²⁺</text>
    </g>`;
    g.appendChild(el);
  });
}

function setMols(fe,scn,fscn){
  for(let i=0;i<MAX_FE;i++) document.getElementById('fe'+i).style.opacity=Math.max(0,Math.min(1,fe-i));
  for(let i=0;i<MAX_SCN;i++) document.getElementById('scn'+i).style.opacity=Math.max(0,Math.min(1,scn-i));
  for(let i=0;i<MAX_FSCN;i++) document.getElementById('fscn'+i).style.opacity=Math.max(0,Math.min(1,fscn-i));
  document.getElementById('cnt-fe').textContent=Math.round(fe);
  document.getElementById('cnt-scn').textContent=Math.round(scn);
  document.getElementById('cnt-fscn').textContent=Math.round(fscn);
}

function setSolution(fscnC,feC,alpha){
  const rf=Math.min(fscnC/9,1),ff=Math.min(feC/6,1);
  const r=Math.round(lerp(lerp(20,210,ff),152,rf));
  const g2=Math.round(lerp(lerp(30,160,ff),26,rf));
  const b=Math.round(lerp(lerp(60,20,ff),10,rf));
  const a=alpha!==undefined?alpha:(0.22+0.48*rf);
  const col=`rgba(${r},${g2},${b},${a.toFixed(2)})`;
  document.getElementById('sol-fill').setAttribute('fill',col);
  document.getElementById('mini-sol1').setAttribute('fill',col);
  document.getElementById('mini-sol2').setAttribute('fill',col);
}

function setRates(fwd,rev){
  document.getElementById('rfwd').style.width=fwd.toFixed(0)+'%';
  document.getElementById('rrev').style.width=rev.toFixed(0)+'%';
  document.getElementById('lfwd').textContent=fwd.toFixed(0)+'%';
  document.getElementById('lrev').textContent=rev.toFixed(0)+'%';
}
function setBtns(on){['btn-fe','btn-oh','btn-water'].forEach(id=>document.getElementById(id).disabled=!on);}
function setPill(txt,cls){const p=document.getElementById('pill');p.textContent=txt;p.className='pill '+cls;}

/* ── Animation ── */
function animFrame(ts){
  if(!lastTs)lastTs=ts;
  const dt=(ts-lastTs)/1000;lastTs=ts;simTime+=dt;

  if(phase==='water_pre'){
    waterAnimT+=dt;
    const wt=Math.min(waterAnimT/T_WATER,1),e=easeOut(wt);
    setSolution(BASE.fscn,BASE.fe,BASE.fscn/9*0.45*(1-e*0.5));
    graphData.push({t:simTime,fe:BASE.fe,scn:BASE.scn,fscn:BASE.fscn,fwd:BASE.rate,rev:BASE.rate});
    if(curSlide===1)drawConc(); if(curSlide===2)drawRate();
    if(wt>=1){
      phase='rebalance';perturbT=simTime;phaseT=0;
      const j=JUMP['water'];
      peakFe=j.fe;peakScn=j.scn;peakFscn=j.fscn;peakFwd=j.fwd;peakRev=j.rev;
      peakFeCnt=Math.round(j.fe/BASE.fe*BASE.feCnt);
      peakScnCnt=Math.round(j.scn/BASE.scn*BASE.scnCnt);
      peakFscnCnt=Math.round(j.fscn/BASE.fscn*BASE.fscnCnt);
      graphData.push({t:simTime+0.001,fe:j.fe,scn:j.scn,fscn:j.fscn,fwd:j.fwd,rev:j.rev});
      setMols(peakFeCnt,peakScnCnt,peakFscnCnt);setSolution(j.fscn,j.fe);setRates(j.fwd,j.rev);
      document.getElementById('info-box').innerHTML=INFO['water'][1];setPill('反應進行中…','changing');
    }
    raf=requestAnimationFrame(animFrame);return;
  }

  if(phase==='eq_pre'){
    graphData.push({t:simTime,fe:BASE.fe,scn:BASE.scn,fscn:BASE.fscn,fwd:BASE.rate,rev:BASE.rate});
    if(curSlide===1)drawConc(); if(curSlide===2)drawRate();
    if(simTime>=T_PRE){
      perturbT=simTime;phaseT=0;
      const j=JUMP[pType];
      peakFe=j.fe;peakScn=j.scn;peakFscn=j.fscn;peakFwd=j.fwd;peakRev=j.rev;
      peakFeCnt=Math.round(j.fe/BASE.fe*BASE.feCnt);
      peakScnCnt=Math.round(j.scn/BASE.scn*BASE.scnCnt);
      peakFscnCnt=Math.round(j.fscn/BASE.fscn*BASE.fscnCnt);
      graphData.push({t:simTime+0.001,fe:j.fe,scn:j.scn,fscn:j.fscn,fwd:j.fwd,rev:j.rev});
      setMols(peakFeCnt,peakScnCnt,peakFscnCnt);setSolution(j.fscn,j.fe);setRates(j.fwd,j.rev);
      phase='rebalance';document.getElementById('info-box').innerHTML=INFO[pType][1];setPill('反應進行中…','changing');
    }
    raf=requestAnimationFrame(animFrame);return;
  }

  if(phase==='rebalance'){
    phaseT=Math.min(phaseT+dt/T_REB,1);
    const e=easeExp(phaseT),tgt=NEW_EQ[pType];
    const fe=lerp(peakFe,tgt.fe,e),scn=lerp(peakScn,tgt.scn,e),fscn=lerp(peakFscn,tgt.fscn,e);
    const fwd=lerp(peakFwd,tgt.rate,e),rev=lerp(peakRev,tgt.rate,e);
    setMols(lerp(peakFeCnt,tgt.feCnt,e),lerp(peakScnCnt,tgt.scnCnt,e),lerp(peakFscnCnt,tgt.fscnCnt,e));
    setSolution(fscn,fe);setRates(fwd,rev);
    graphData.push({t:simTime,fe,scn,fscn,fwd,rev});
    if(curSlide===1)drawConc(); if(curSlide===2)drawRate();
    if(phaseT>=1){
      phase='eq_post';setPill('✓ 動態平衡','eq');
      document.getElementById('info-box').innerHTML=INFO[pType][2];setBtns(true);
    }
    raf=requestAnimationFrame(animFrame);return;
  }

  if(phase==='eq_post'){
    const tgt=NEW_EQ[pType];
    graphData.push({t:simTime,fe:tgt.fe,scn:tgt.scn,fscn:tgt.fscn,fwd:tgt.rate,rev:tgt.rate});
    if(curSlide===1)drawConc(); if(curSlide===2)drawRate();
    if(simTime-perturbT-T_REB>T_POST){raf=null;return;}
    raf=requestAnimationFrame(animFrame);return;
  }
  raf=null;
}

function perturb(type){
  if(phase!=='eq'&&phase!=='eq_post')return;
  if(raf){cancelAnimationFrame(raf);raf=null;}
  pType=type;phaseT=0;simTime=0;graphData=[];perturbT=null;lastTs=null;waterAnimT=0;
  peakFe=BASE.fe;peakScn=BASE.scn;peakFscn=BASE.fscn;peakFwd=BASE.rate;peakRev=BASE.rate;
  setBtns(false);
  document.getElementById('info-box').innerHTML=INFO[type][0];
  setPill('反應進行中…','changing');
  setMols(BASE.feCnt,BASE.scnCnt,BASE.fscnCnt);setSolution(BASE.fscn,BASE.fe);setRates(BASE.rate,BASE.rate);
  if(type==='water')phase='water_pre'; else phase='eq_pre';
  raf=requestAnimationFrame(animFrame);
}

function fullReset(){
  if(raf){cancelAnimationFrame(raf);raf=null;}
  phase='eq';pType=null;simTime=0;graphData=[];perturbT=null;phaseT=0;waterAnimT=0;
  setMols(BASE.feCnt,BASE.scnCnt,BASE.fscnCnt);setSolution(BASE.fscn,BASE.fe);setRates(BASE.rate,BASE.rate);
  setPill('✓ 動態平衡','eq');
  document.getElementById('info-box').textContent='系統目前處於動態平衡。選擇擾動條件，觀察平衡如何移動。';
  setBtns(true);if(cCtx)drawConc();if(rCtx)drawRate();
}

/* ── Init ── */
buildMolLayer();
setMols(BASE.feCnt,BASE.scnCnt,BASE.fscnCnt);
setSolution(BASE.fscn,BASE.fe);
setRates(BASE.rate,BASE.rate);
setTimeout(()=>{initConcCanvas();initRateCanvas();drawConc();drawRate();},200);
// Hide swipe hint after 4s
setTimeout(()=>{if(!hintHidden){hint.style.opacity='0';}},4000);
</script>
